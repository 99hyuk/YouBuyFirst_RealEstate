<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Front Visual References</title>
    <style>
      :root {
        color: #172033;
        background: #eef3f8;
        font-family: Pretendard, "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      body { margin: 0; }

      main {
        width: min(100% - 36px, 1360px);
        margin: 0 auto;
        padding: 28px 0 54px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1, p { margin: 0; }
      h1 { color: #172033; font-size: 24px; font-weight: 920; letter-spacing: 0; }
      header p { margin-top: 6px; color: #647184; font-size: 13px; font-weight: 700; }

      .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
      a {
        display: inline-flex;
        min-height: 32px;
        align-items: center;
        padding: 0 11px;
        border: 1px solid #cfd9e7;
        border-radius: 999px;
        background: #ffffff;
        color: #2f6fed;
        font-size: 12px;
        font-weight: 820;
        text-decoration: none;
      }

      .reference-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        align-items: start;
      }

      .reference-section {
        grid-column: 1 / -1;
        margin: 12px 0 0;
        color: #536274;
        font-size: 13px;
        font-weight: 860;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid #d4deea;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(31, 42, 60, 0.06);
      }

      .image-slot {
        display: grid;
        min-height: 560px;
        max-height: 740px;
        overflow: hidden;
        background: #f7faff;
        place-items: center;
      }

      .image-slot img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: inherit;
        object-fit: cover;
        object-position: top center;
        background: #ffffff;
      }

      .notice {
        grid-column: 1 / -1;
        padding: 14px 16px;
        border: 1px dashed #c4cfdd;
        border-radius: 10px;
        background: #f9fbfd;
        color: #5e6b7e;
        font-size: 13px;
        font-weight: 740;
      }

      figcaption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 40px;
        padding: 0 12px;
        border-top: 1px solid #e1e8f0;
        color: #172033;
        font-size: 13px;
        font-weight: 860;
      }

      figcaption code {
        overflow: hidden;
        color: #748197;
        font-family: Consolas, monospace;
        font-size: 11px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 1040px) {
        .reference-grid { grid-template-columns: 1fr; }
        .image-slot { min-height: 520px; }
      }

      @media (max-width: 720px) {
        main { width: min(100% - 20px, 1360px); }
        header { align-items: flex-start; flex-direction: column; }
        .actions { justify-content: flex-start; }
        .image-slot { min-height: 420px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>자료 모음집</h1>
          <p>사용자가 준 원본 이미지 파일을 우선 보존하고, 화면 작업 참고용으로만 봅니다.</p>
        </div>
        <div class="actions">
          <a href="../index.html">Visual History</a>
          <a href="./assets/">이미지 폴더</a>
          <a href="file:///C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/">원본 저장 폴더</a>
        </div>
      </header>

      <section class="reference-grid" aria-label="프론트 레퍼런스 이미지">
        <p class="reference-section">종목 상세 팩트폭격 배너 원본</p>
        <figure>
          <div class="image-slot">
            <img src="./assets/reference-palantir-roast.webp" alt="팔란티어 종목 상세 원본 레퍼런스" />
          </div>
          <figcaption><strong>팔란티어</strong><code>reference-palantir-roast.webp</code></figcaption>
        </figure>

        <figure>
          <div class="image-slot">
            <img src="./assets/reference-nuscale-roast.webp" alt="뉴스케일 종목 상세 원본 레퍼런스" />
          </div>
          <figcaption><strong>뉴스케일</strong><code>reference-nuscale-roast.webp</code></figcaption>
        </figure>

        <figure>
          <div class="image-slot">
            <img src="./assets/reference-ast-roast.webp" alt="AST 스페이스모바일 종목 상세 원본 레퍼런스" />
          </div>
          <figcaption><strong>AST 스페이스모바일</strong><code>reference-ast-roast.webp</code></figcaption>
        </figure>

        <p class="reference-section">개미 심리 지수 게이지 원본</p>
        <div class="notice">
          현재 로컬 저장소에서는 네가 올린 Fear &amp; Greed 캡처 원본 파일을 찾지 못했습니다. 파일을 받는 즉시 이 섹션에 원본 이미지 그대로 연결합니다.
        </div>
      </section>
    </main>
  </body>
</html>
