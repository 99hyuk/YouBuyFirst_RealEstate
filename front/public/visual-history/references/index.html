<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Front Visual References</title>
    <style>
      :root {
        color: #172033;
        background: #eef3f8;
        font-family:
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(100% - 36px, 1360px);
        margin: 0 auto;
        padding: 28px 0 54px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        color: #172033;
        font-size: 24px;
        font-weight: 920;
        letter-spacing: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      a {
        display: inline-flex;
        min-height: 32px;
        align-items: center;
        padding: 0 11px;
        border: 1px solid #cfd9e7;
        border-radius: 999px;
        background: #ffffff;
        color: #2f6fed;
        font-size: 12px;
        font-weight: 820;
        text-decoration: none;
      }

      .reference-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
        align-items: start;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid #d4deea;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(31, 42, 60, 0.06);
      }

      .image-slot {
        display: grid;
        position: relative;
        min-height: 520px;
        max-height: 760px;
        overflow: hidden;
        background: #f7faff;
        place-items: center;
      }

      .image-slot img {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 520px;
        object-fit: cover;
        object-position: top center;
        background: #ffffff;
      }

      .image-slot span {
        display: none;
        padding: 12px;
        color: #7a8798;
        font-size: 12px;
        font-weight: 760;
        text-align: center;
      }

      .image-slot.missing {
        border-bottom: 1px dashed #c8d4e4;
        background:
          repeating-linear-gradient(0deg, #e6edf6 0 1px, transparent 1px 28px),
          #f7faff;
      }

      .image-slot.missing img {
        display: none;
      }

      .image-slot.missing span {
        display: block;
      }

      figcaption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 40px;
        padding: 0 12px;
        color: #172033;
        font-size: 13px;
        font-weight: 860;
      }

      figcaption code {
        overflow: hidden;
        color: #748197;
        font-family:
          "SFMono-Regular",
          Consolas,
          monospace;
        font-size: 11px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1360px);
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .image-slot,
        .image-slot img {
          min-height: 440px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>자료 모음집</h1>
        <div class="actions">
          <a href="../index.html">Visual History</a>
          <a href="file:///C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/">이미지 폴더</a>
        </div>
      </header>

      <section class="reference-grid" aria-label="프론트 레퍼런스 이미지">
        <figure>
          <div class="image-slot">
            <img
              src="file:///C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/reference-palantir-roast.webp"
              data-server-src="/@fs/C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/reference-palantir-roast.webp"
              alt="팔란티어 한줄평 배너 레퍼런스"
              onerror="this.parentElement.classList.add('missing')"
            />
            <span>reference-palantir-roast.webp</span>
          </div>
          <figcaption>
            <strong>팔란티어</strong>
            <code>reference-palantir-roast.webp</code>
          </figcaption>
        </figure>

        <figure>
          <div class="image-slot">
            <img
              src="file:///C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/reference-nuscale-roast.webp"
              data-server-src="/@fs/C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/reference-nuscale-roast.webp"
              alt="뉴스케일 한줄평 배너 레퍼런스"
              onerror="this.parentElement.classList.add('missing')"
            />
            <span>reference-nuscale-roast.webp</span>
          </div>
          <figcaption>
            <strong>뉴스케일</strong>
            <code>reference-nuscale-roast.webp</code>
          </figcaption>
        </figure>

        <figure>
          <div class="image-slot">
            <img
              src="file:///C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/reference-ast-roast.webp"
              data-server-src="/@fs/C:/agents/YouBuyFirst/docs/assets/stock-detail-copy/reference-ast-roast.webp"
              alt="AST 검정 경고형 배너 레퍼런스"
              onerror="this.parentElement.classList.add('missing')"
            />
            <span>reference-ast-roast.webp</span>
          </div>
          <figcaption>
            <strong>AST 스페이스모바일</strong>
            <code>reference-ast-roast.webp</code>
          </figcaption>
        </figure>
      </section>
    </main>
    <script>
      if (location.protocol === 'http:' || location.protocol === 'https:') {
        document.querySelectorAll('img[data-server-src]').forEach((image) => {
          image.src = image.dataset.serverSrc;
        });
      }
    </script>
  </body>
</html>
