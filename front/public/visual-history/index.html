<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouBuyFirst Front Visual History</title>
    <style>
      :root {
        color: #17212b;
        background: #f3f6f8;
        font-family:
          Pretendard,
          "Pretendard Variable",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(980px, calc(100% - 40px));
        margin: 0 auto;
        padding: 36px 0 64px;
      }

      header {
        display: grid;
        gap: 10px;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #627084;
        font-size: 14px;
        line-height: 1.55;
      }

      .actions,
      .date-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 6px;
      }

      a {
        color: #2f6fed;
        font-size: 13px;
        font-weight: 760;
        text-decoration: none;
      }

      .actions a,
      .date-actions a {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid #d8e1ec;
        border-radius: 999px;
        background: #ffffff;
        color: #26384f;
        box-shadow: 0 8px 20px rgba(39, 51, 67, 0.06);
      }

      .date-list {
        display: grid;
        gap: 16px;
      }

      article {
        display: grid;
        gap: 12px;
        padding: 18px;
        border: 1px solid #dfe5ec;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 14px 36px rgba(39, 51, 67, 0.08);
      }

      .date-title {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px 16px;
      }

      h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.3;
      }

      .meta {
        color: #8491a3;
        font-size: 12px;
        font-weight: 700;
      }

      code {
        color: #526071;
        font-size: 12px;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 24px, 980px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Front Visual History</h1>
        <p>날짜별로 프론트 화면 캡처를 나눠 보는 로컬 갤러리입니다.</p>
        <p>루트 페이지에는 날짜 목록만 두고, 실제 이미지는 날짜별 폴더 안에 모읍니다.</p>
        <div class="actions" aria-label="로컬 갤러리 링크">
          <a href="http://127.0.0.1:5174/visual-history/index.html">서버 index.html</a>
          <a href="file:///C:/agents/YouBuyFirst/.worktrees/front-dashboard-content/front/public/visual-history/index.html">로컬 index.html</a>
          <a href="file:///C:/agents/YouBuyFirst/.worktrees/front-dashboard-content/front/public/visual-history/">날짜 폴더 열기</a>
        </div>
      </header>

      <section class="date-list" aria-label="날짜별 프론트 UI 캡처">
        <article>
          <div class="date-title">
            <h2>2026-05-17</h2>
            <span class="meta">5 screenshots</span>
          </div>
          <p>검색/피드/종목 반응/속보 띠를 집중적으로 다듬은 날짜입니다.</p>
          <div class="date-actions">
            <a href="./2026-05-17/index.html">이 날짜 갤러리 보기</a>
            <a href="file:///C:/agents/YouBuyFirst/.worktrees/front-dashboard-content/front/public/visual-history/2026-05-17/">이미지 폴더 열기</a>
          </div>
          <code>front/public/visual-history/2026-05-17/</code>
        </article>
      </section>
    </main>
  </body>
</html>
