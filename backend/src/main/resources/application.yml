spring:
  application:
    name: youbuyfirst-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/youbuyfirst?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:youbuyfirst}
    password: ${SPRING_DATASOURCE_PASSWORD:youbuyfirst}
  flyway:
    enabled: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: ${SERVER_SESSION_TIMEOUT:30m}
      cookie:
        http-only: true
        secure: ${SERVER_SESSION_COOKIE_SECURE:false}
        same-site: lax

app:
  retention:
    post-days: ${POST_RETENTION_DAYS:30}
    cleanup-cron: ${POST_RETENTION_CLEANUP_CRON:0 15 3 * * *}
  realestate:
    batch:
      scheduling-enabled: ${REALESTATE_BATCH_SCHEDULING_ENABLED:true}
      newsroom-cron: ${REALESTATE_NEWSROOM_BATCH_CRON:0 20 */2 * * *}
      schedule-cron: ${REALESTATE_SCHEDULE_BATCH_CRON:0 10 4 * * *}
      reb-weekly-price-index-cron: ${REALESTATE_REB_WEEKLY_PRICE_INDEX_BATCH_CRON:0 30 8 * * THU}
      reb-weekly-price-index-url: ${REALESTATE_REB_WEEKLY_PRICE_INDEX_URL:https://www.reb.or.kr/r-one/portal/stat/easyStatPage/T244183132827305.do}
      reb-weekly-price-index-latest-weeks: ${REALESTATE_REB_WEEKLY_PRICE_INDEX_LATEST_WEEKS:60}
      zone: ${REALESTATE_BATCH_ZONE:Asia/Seoul}
    newsroom:
      sources:
        - id: google-news-realestate
          feed: news
          source-id: google_news_rss
