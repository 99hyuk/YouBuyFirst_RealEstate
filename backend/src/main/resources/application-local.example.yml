spring:
  config:
    activate:
      on-profile: local

app:
  realestate:
    batch:
      # R-ONE weekly apartment sale price index change-rate refresh.
      reb-weekly-price-index-url: "https://www.reb.or.kr/r-one/portal/stat/easyStatPage/T244183132827305.do"
      reb-weekly-price-index-cron: "0 30 8 * * THU"
      reb-weekly-price-index-latest-weeks: 60
    public-data:
      # Copy this file to application-local.yml and keep the real key out of git.
      data-go-service-key: "put-your-data-go-service-key-here"
    ai:
      # GMS is an OpenAI-compatible gateway when base-url points to the GMS OpenAI path.
      # Keep the real key in application-local.yml, .env, or a secret manager only.
      gms-key: "put-your-gms-key-here"
      openai-base-url: "https://gms.ssafy.io/gmsapi/api.openai.com/v1"
      chat-model: "gpt-5-mini"
      # Embeddings use the Gemini-compatible GMS path, not the OpenAI-compatible path.
      gemini-base-url: "https://gms.ssafy.io/gmsapi/generativelanguage.googleapis.com"
      embedding-model: "gemini-embedding-2"
  auth:
    oauth:
      success-redirect: "http://127.0.0.1:5173/dashboard"
      failure-redirect: "http://127.0.0.1:5173/auth/login?oauth=failed"
      # Optional: use environment variables instead in local runs.
      # Redirect URI: http://127.0.0.1:8080/login/oauth2/code/{provider}
      # Public tunnel proxy demo: set redirect-base-url to the public frontend origin.
      redirect-base-url: ""
      google:
        client-id: ""
        client-secret: ""
      naver:
        client-id: ""
        client-secret: ""
      kakao:
        client-id: ""
        # Kakao client secret is optional unless enabled in the Kakao app settings.
        client-secret: ""
