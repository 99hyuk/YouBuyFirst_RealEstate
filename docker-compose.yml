services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: youbuyfirst
      MYSQL_USER: youbuyfirst
      MYSQL_PASSWORD: youbuyfirst
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - youbuyfirst-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uyoubuyfirst", "-pyoubuyfirst"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/youbuyfirst?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: youbuyfirst
      SPRING_DATASOURCE_PASSWORD: youbuyfirst
      DATA_GO_SERVICE_KEY: ${DATA_GO_SERVICE_KEY:-}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  # 기동 시 실거래(MOLIT) 데이터를 1회 멱등 적재한다. 데이터가 이미 있으면 즉시 종료.
  # 팀원은 .env에 DATA_GO_SERVICE_KEY만 넣고 `docker compose up` 하면 데이터가 채워진다.
  realestate-seed:
    build:
      context: ./pipeline
    environment:
      SPRING_BASE_URL: http://backend:8080
      DATA_GO_SERVICE_KEY: ${DATA_GO_SERVICE_KEY:-}
    depends_on:
      - backend
    restart: "no"
    command: ["bash", "/workspace/scripts/seed-realestate.sh"]

  pipeline:
    build:
      context: ./pipeline
    environment:
      SPRING_BASE_URL: http://backend:8080
      DATA_GO_SERVICE_KEY: ${DATA_GO_SERVICE_KEY:-}
      REALESTATE_DEAL_YM: ${REALESTATE_DEAL_YM:-}
      REALESTATE_MARKET_FACT_REFRESH_ENABLED: ${REALESTATE_MARKET_FACT_REFRESH_ENABLED:-false}
      REALESTATE_MARKET_FACT_REFRESH_INTERVAL_MINUTES: ${REALESTATE_MARKET_FACT_REFRESH_INTERVAL_MINUTES:-360}
      SPRING_CLIENT_TIMEOUT_SECONDS: 60
      CRAWL_RUNTIME_ENV: local
      CRAWL_INTERVAL_MINUTES: 30
      LOG_LEVEL: INFO
    depends_on:
      - backend

volumes:
  youbuyfirst-mysql-data:
