services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: youbuyfirst
      MYSQL_USER: youbuyfirst
      MYSQL_PASSWORD: youbuyfirst
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - youbuyfirst-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uyoubuyfirst", "-pyoubuyfirst"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/youbuyfirst?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: youbuyfirst
      SPRING_DATASOURCE_PASSWORD: youbuyfirst
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  pipeline:
    build:
      context: ./pipeline
    environment:
      SPRING_BASE_URL: http://backend:8080
      SPRING_CLIENT_TIMEOUT_SECONDS: 60
      SPRING_CHART_CANDLE_BATCH_SIZE: 4
      CRAWL_RUNTIME_ENV: local
      CRAWL_INTERVAL_MINUTES: 30
      MARKET_REFRESH_ENABLED: "true"
      MARKET_REFRESH_INTERVAL_MINUTES: 10
      MARKET_QUOTE_SYMBOLS: 005930.KS,000660.KS,069500.KS,454910.KS,035420.KS,086520.KQ,042700.KS,066570.KS,005380.KS,006400.KS,AAPL,MSFT,NVDA,TSLA,AMZN,GOOGL,META,AMD,SOFI,PLTR,TSM,SMR,SPY,QQQ
      MARKET_CHART_RANGE: 5Y
      MARKET_CHART_INTERVAL: 1d
      MARKET_CHART_ON_DEMAND_REFRESH_ENABLED: "true"
      MARKET_CHART_ON_DEMAND_REFRESH_INTERVAL_SECONDS: 60
      MARKET_CHART_ON_DEMAND_CLAIM_LIMIT: 20
      MARKET_INVESTOR_FLOW_REFRESH_ENABLED: "true"
      MARKET_INVESTOR_FLOW_SYMBOLS: 005930.KS,000660.KS,069500.KS
      MARKET_INVESTOR_FLOW_REFRESH_HOUR_LOCAL: 18
      MARKET_INVESTOR_FLOW_REFRESH_MINUTE_LOCAL: 30
      MARKET_INVESTOR_FLOW_REFRESH_TIMEZONE: Asia/Seoul
      NAVER_STOCK_CODES: 005930,000660
      INSTRUMENT_CSV_PATH: data/instruments.sample.csv
      LOG_LEVEL: INFO
    depends_on:
      - backend

volumes:
  youbuyfirst-mysql-data:
